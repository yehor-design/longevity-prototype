<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DT Health — Digital Twin Health Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <!-- Prevent flash of wrong theme: read persisted theme from localStorage before React renders -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("dt-health-theme");
          if (stored) {
            var parsed = JSON.parse(stored);
            var theme = parsed && parsed.state && parsed.state.theme;
            var resolved =
              theme === "dark"
                ? "dark"
                : theme === "light"
                ? "light"
                : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            document.documentElement.classList.add(resolved);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
